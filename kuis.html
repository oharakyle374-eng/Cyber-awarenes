<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Keamanan Informasi - UNIBA Madura</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Style tambahan khusus kuis agar lebih proper */
        .progress-bar {
            width: 100%;
            background-color: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #3498db;
            width: 0%;
            transition: width 0.3s ease;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            margin: 12px 0;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not([disabled]) {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        /* Kelas status jawaban */
        .correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
    </style>
</head>
<body>

    <header>
    <div class="nav-container">
        <h2>Waspada Digital</h2>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="artikel.html">Artikel & Tips</a>
            <a href="simulasi.html">Simulasi</a>
            <a href="kuis.html">Kuis</a>
            <a href="dokumentasi.html">Dokumentasi</a>
        </nav>
    </div>
</header>

    <main style="max-width: 650px; margin: 40px auto; padding: 30px; border-radius: 12px;">
        
        <!-- Wadah Utama Kuis -->
        <div id="quiz-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4 style="color: #7f8c8d; margin: 0;" id="quiz-progress-text">Pertanyaan 0 dari 0</h4>
                <span id="live-score" style="font-weight: bold; color: #2c3e50;">Skor: 0</span>
            </div>
            
            <!-- Progress Bar -->
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>

            <h3 id="question-text" style="font-size: 1.25rem; line-height: 1.5; margin-bottom: 20px;">Memuat pertanyaan...</h3>
            
            <div id="options-container">
                <!-- Pilihan Ganda Muncul Di Sini -->
            </div>

            <!-- Tombol Navigasi Kuis -->
            <button id="next-btn" style="display: none; margin-top: 20px; background-color: #2c3e50; color: white; padding: 12px 30px; border-radius: 6px; float: right; cursor: pointer;">
                Selanjutnya &rarr;
            </button>
            <div style="clear: both;"></div>
        </div>

        <!-- Wadah Skor Akhir (Awalnya tersembunyi) -->
        <div id="result-box" style="display: none; text-align: center; padding: 20px 0;">
            <h2 style="font-size: 2rem; color: #2c3e50; margin-bottom: 10px;">Kuis Selesai! 🎉</h2>
            <div style="background: #f8f9fa; padding: 30px; border-radius: 8px; margin: 20px 0;">
                <p style="font-size: 1.2rem; margin-bottom: 5px;">Skor Akhir Anda:</p>
                <h1 id="final-score" style="font-size: 3.5rem; color: #27ae60; margin-bottom: 15px;">0</h1>
                <p id="evaluation-text" style="color: #555; font-weight: 500; line-height: 1.6;"></p>
            </div>
            <button onclick="location.reload()" style="background-color: #3498db; color: white; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer;">
                Ulangi Kuis (Acak Lagi)
            </button>
        </div>

    </main>

    <script src="js/kuis.js"></script>
</body>
</html>
