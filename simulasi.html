/* ====== Base site styles (embedded for guaranteed rendering) ====== */
/* ==========================================================================

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  /* -- Color tokens -- */
  --bg: #0a0e14;
  --bg-elevated: #10151d;
  --bg-card: #131a24;
  --bg-soft: #0d131b;

  --text: #e7edf5;
  --text-muted: #8896a8;
  --text-faint: #5b6779;

  --primary: #f5a524;      /* amber — alert / signature accent */
  --primary-dim: #b9791a;
  --accent: #35c1ea;       /* cyan — "digital signal" */
  --danger: #ef4459;
  --success: #2fd47c;

  --border-color: #202938;
  --border-soft: #182130;

  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;

  --font-display: 'JetBrains Mono', ui-monospace, monospace;
  --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --shadow-glow: 0 0 0 1px rgba(245, 165, 36, 0.12), 0 12px 40px -12px rgba(0, 0, 0, 0.6);
  --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.03) inset, 0 10px 30px -14px rgba(0, 0, 0, 0.7);

  /* aliases used by page-specific inline style blocks */
  --text-main: var(--text);
  --text-secondary: var(--text-muted);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

button {

  font-size: 0.95rem;
  border: none;
  cursor: pointer;
  border-radius: var(--radius-sm);
  color: var(--text);
  background: var(--bg-elevated);
  padding: 10px 18px;
  transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
}

button:hover:not(:disabled) { filter: brightness(1.08); }
button:active:not(:disabled) { transform: translateY(1px); }
button:disabled { cursor: default; opacity: 0.65; }

body {
  margin: 0;
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(245, 165, 36, 0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 10%, rgba(53, 193, 234, 0.08), transparent 55%),

  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* faint circuit-grid texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.35;
  background-image:
    linear-gradient(rgba(148, 163, 184, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148, 163, 184, 0.045) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, black 40%, transparent 100%);
}

/* HUD corner-bracket frame — the page's signature element, evokes a live
   monitoring console watching over the content */
body::after {
  content: "";
  position: fixed;
  inset: 16px;
  pointer-events: none;
  z-index: 3;
  opacity: 0.4;
  background-repeat: no-repeat;
  background-image:
    linear-gradient(var(--primary), var(--primary)), linear-gradient(var(--primary), var(--primary)),
    linear-gradient(var(--accent), var(--accent)),  linear-gradient(var(--accent), var(--accent)),
    linear-gradient(var(--accent), var(--accent)),  linear-gradient(var(--accent), var(--accent)),
    linear-gradient(var(--primary), var(--primary)), linear-gradient(var(--primary), var(--primary));
  background-size:
    24px 2px, 2px 24px,
    24px 2px, 2px 24px,
    24px 2px, 2px 24px,
    24px 2px, 2px 24px;
  background-position:
    top left, top left,
    top right, top right,
    bottom left, bottom left,
    bottom right, bottom right;
}

@media (max-width: 640px) {
  body::after { display: none; }
}

h1, h2, h3, h4, h5, h6 {

/* ==========================================================================

header {

main {

.btn {

@keyframes btn-glow {

main > div[style*="grid-template-columns"] > div::before {

h3 { font-size: 1.5rem; }

/* ==========================================================================
   Feature cards
   ========================================================================== */

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 26px 24px 24px;
  box-shadow: var(--shadow-card);
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  position: relative;
  isolation: isolate;
}

.card::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: -1;
  pointer-events: none;
}

.card:hover::before { opacity: 1; }

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 24px 50px -18px rgba(0, 0, 0, 0.8), 0 0 30px -10px rgba(245, 165, 36, 0.25);

#chat-input {

#chat-input::placeholder { color: var(--text-faint); }

#chat-window > div:last-child {
  background: var(--bg-elevated) !important;
  border-top: 1px solid var(--border-color) !important;
}

#chat-window button:not(#chat-toggle-btn):last-child,
#chat-window > div:last-child button {
  background: var(--primary) !important;
  color: #16110a !important;
}

/* ==========================================================================

@media (max-width: 640px) {
