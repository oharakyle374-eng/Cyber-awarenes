<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Phishing - Keamanan Digital</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* --- WhatsApp Mockup Style --- */
        .wa-container {
            background-color: #efeae2;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            overflow: hidden;
            margin: 25px 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .wa-header {
            background-color: #075e54;
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .wa-avatar {
            width: 36px;
            height: 36px;
            background-color: #eceff1;
            border-radius: 50%;
            display: inline-block;
        }
        .wa-body {
            padding: 20px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .wa-bubble {
            background-color: #ffffff;
            padding: 12px 16px;
            border-radius: 0 12px 12px 12px;
            max-width: 85%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            color: #111b21;
            position: relative;
        }
        .wa-link-card {
            background-color: #f0f2f5;
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
            border-left: 4px solid #34b7f1;
            font-size: 0.9rem;
        }

        /* --- Email Mockup Style --- */
        .email-container {
            background-color: #ffffff;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            overflow: hidden;
            margin: 25px 0;
            box-shadow: var(--shadow);
        }
        .email-header {
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 20px;
        }
        .email-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .email-body {
            padding: 25px 20px;
            color: #334155;
        }
        .email-btn-mock {
            display: inline-block;
            background-color: #dc2626;
            color: white !important;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin: 15px 0;
            font-size: 0.9rem;
        }

        /* --- Action Controls --- */
        .sim-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .btn-safe { background-color: var(--success); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); width: 100%; }
        .btn-danger { background-color: var(--danger); box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2); width: 100%; }
        
        .alert-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--radius-md);
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <h2>Waspada Digital</h2>
            <nav>
                <a href="index.html">Beranda</a>
                <a href="artikel.html">Artikel & Tips</a>
                <a href="simulasi.html" class="active">Simulasi</a>
                <a href="kuis.html">Kuis</a>
                <a href="dokumentasi.html">Dokumentasi</a>
            </nav>
        </div>
    </header>

    <main style="max-width: 750px;">
        <h2 style="font-size: 1.8rem; margin-bottom: 5px;">🕹️ Laboratorium Simulasi Phishing</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Analisis spesifikasi pesan di bawah ini dengan jeli sebelum mengambil keputusan hukum digital!</p>
        <hr>

        <div id="simulation-wrapper">
            <h3 id="case-title" style="color: var(--accent); font-size: 1.2rem;">Skenario...</h3>
            
            <div id="mockup-area"></div>

            <p style="font-weight: 600; margin-top: 20px; text-align: center;">Apakah pesan di atas aman untuk diklik, diunduh, atau direspons?</p>
            
            <div class="sim-actions">
                <button onclick="prosesPilihan('aman')" class="btn-safe">🟢 Aman, Klik/Respons</button>
                <button onclick="prosesPilihan('bahaya')" class="btn-danger">🔴 Bahaya, Blokir/Laporkan</button>
            </div>
        </div>

        <div id="feedback-box" class="alert-box">
            <h4 id="feedback-title" style="margin-bottom: 8px; font-size: 1.1rem;"></h4>
            <p id="feedback-text" style="margin-bottom: 15px; font-size: 0.95rem;"></p>
            <button id="btn-next-case" onclick="nextSkenario()" style="background-color: var(--primary); padding: 10px 20px;">
                Skenario Berikutnya &rarr;
            </button>
        </div>
    </main>

    <script src="js/simulasi.js"></script>
</body>
</html>
